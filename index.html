<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Radstrix | Maximum Flow Solver</title>
    <style>
        :root {
            --bg-color: #f5f5f5;
            --surface: #ffffff;
            --text-main: #333333;
            --text-muted: #888888;
            --border: #dddddd;
            --accent: #555555;
            --accent-hover: #222222;
            --font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-family);
            background-color: var(--bg-color);
            color: var(--text-main);
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* Plexus Background */
        canvas.plexus-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        /* Lock Screen */
        #authScreen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #111111;
            color: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.5s ease;
        }

        .auth-box {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 8px;
            text-align: center;
            z-index: 10;
            width: 400px;
        }

        .auth-box h1 { margin-bottom: 10px; font-weight: 300; letter-spacing: 2px; }
        .auth-box p { color: #aaaaaa; margin-bottom: 20px; font-size: 14px; }
        .device-id-box {
            background: rgba(0,0,0,0.5);
            padding: 10px;
            margin-bottom: 20px;
            font-family: monospace;
            letter-spacing: 1px;
            border-radius: 4px;
            color: #dddddd;
        }
        
        input.auth-input {
            width: 100%;
            padding: 12px;
            background: rgba(255,255,255,0.1);
            border: 1px solid rgba(255,255,255,0.2);
            color: white;
            border-radius: 4px;
            outline: none;
            margin-bottom: 15px;
            text-align: center;
            letter-spacing: 1px;
        }

        input.auth-input:focus { border-color: #ffffff; }

        button.btn {
            background-color: var(--surface);
            color: var(--text-main);
            border: 1px solid var(--border);
            padding: 10px 15px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: 600;
            transition: all 0.3s;
            width: 100%;
        }

        button.btn:hover { background-color: var(--text-main); color: var(--surface); }
        button.btn.dark { background-color: var(--text-main); color: var(--surface); }
        button.btn.dark:hover { background-color: var(--accent); }

        /* Main App Layout */
        #app {
            display: flex;
            flex: 1;
            z-index: 1;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.5s ease;
        }

        /* Semantic Tags Styling */
        aside {
            width: 350px;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow-y: auto;
            z-index: 2;
            box-shadow: 2px 0 10px rgba(0,0,0,0.05);
        }

        main {
            flex: 1;
            position: relative;
            background: transparent;
        }

        section.panel {
            background: var(--surface);
            border: 1px solid var(--border);
            padding: 15px;
            border-radius: 6px;
            margin-bottom: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }

        h2 { font-size: 16px; margin-bottom: 15px; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); border-bottom: 1px solid var(--border); padding-bottom: 5px; }
        
        .input-group { margin-bottom: 12px; }
        .input-group label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 4px; color: var(--text-muted); }
        .input-group input { width: 100%; padding: 8px; border: 1px solid var(--border); border-radius: 4px; background: var(--bg-color); color: var(--text-main); }
        
        .flex-row { display: flex; gap: 10px; }
        .flex-row > div { flex: 1; }

        .arc-list { list-style: none; font-size: 13px; max-height: 150px; overflow-y: auto; border: 1px solid var(--border); padding: 5px; border-radius: 4px; background: var(--bg-color); }
        .arc-list li { padding: 4px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between;}
        .arc-list li:last-child { border-bottom: none; }

        /* Graph Canvas */
        #graphCanvas {
            width: 100%;
            height: 100%;
            cursor: grab;
            display: block;
        }
        #graphCanvas:active { cursor: grabbing; }

        /* Overlay Analysis Panel */
        article.analysis-panel {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 320px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(5px);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            display: none;
            flex-direction: column;
            z-index: 10;
        }

        .controls { display: flex; gap: 5px; margin-bottom: 15px; }
        .controls button { padding: 8px; font-size: 12px; flex: 1; }
        
        .log-box {
            background: var(--bg-color);
            border: 1px solid var(--border);
            font-family: monospace;
            font-size: 12px;
            padding: 10px;
            height: 250px;
            overflow-y: auto;
            border-radius: 4px;
            color: var(--accent);
            line-height: 1.5;
        }

        .step-title { font-weight: bold; margin-bottom: 10px; text-align: center;}
    </style>
</head>
<body>

    <div id="authScreen">
        <canvas class="plexus-bg" id="lockPlexus"></canvas>
        <div class="auth-box">
            <h1>SYSTEM LOCKED</h1>
            <p>Authentication Required</p>
            <div class="device-id-box" id="dispDeviceId">LOADING...</div>
            <input type="password" id="keyInput" class="auth-input" placeholder="Enter Access Key" autocomplete="off">
            <button class="btn" onclick="verifyKey()">AUTHENTICATE</button>
        </div>
    </div>

    <div id="app">
        <canvas class="plexus-bg" id="mainPlexus"></canvas>
        
        <aside>
            <section class="panel">
                <h2>Parameter Node</h2>
                <div class="flex-row">
                    <div class="input-group">
                        <label>Source Node</label>
                        <input type="text" id="sourceInp" value="1">
                    </div>
                    <div class="input-group">
                        <label>Sink Node</label>
                        <input type="text" id="sinkInp" value="7">
                    </div>
                </div>
            </section>

            <section class="panel">
                <h2>Tambah Arc</h2>
                <div class="flex-row">
                    <div class="input-group">
                        <label>Dari (u)</label>
                        <input type="text" id="arcFrom">
                    </div>
                    <div class="input-group">
                        <label>Ke (v)</label>
                        <input type="text" id="arcTo">
                    </div>
                </div>
                <div class="flex-row">
                    <div class="input-group">
                        <label>Kapasitas (u&rarr;v)</label>
                        <input type="number" id="capFwd" min="0">
                    </div>
                    <div class="input-group">
                        <label>Kapasitas (v&rarr;u)</label>
                        <input type="number" id="capRev" value="0" min="0">
                    </div>
                </div>
                <button class="btn dark" onclick="addArc()">TAMBAH</button>
            </section>

            <section class="panel" style="flex:1; display:flex; flex-direction:column;">
                <h2>Daftar Arc</h2>
                <ul class="arc-list" id="arcList"></ul>
                <div style="margin-top: auto; padding-top: 15px;">
                    <button class="btn dark" onclick="startAnalysis()">ANALISIS MAXIMUM FLOW</button>
                </div>
            </section>
        </aside>

        <main>
            <canvas id="graphCanvas"></canvas>
            
            <article class="analysis-panel" id="analysisPanel">
                <div class="step-title" id="stepTitle">Iterasi: 0</div>
                <div class="controls">
                    <button class="btn" onclick="prevStep()">&larr; Prev</button>
                    <button class="btn" onclick="nextStep()">Next &rarr;</button>
                </div>
                <div class="log-box" id="logBox"></div>
            </article>
        </main>
    </div>

    <script>
        /* =========================================
           1. AUTHENTICATION & FINGERPRINT SYSTEM
           ========================================= */
        function simpleHash(str) {
            let hash = 0;
            for (let i = 0; i < str.length; i++) {
                hash = ((hash << 5) - hash) + str.charCodeAt(i);
                hash = hash & hash;
            }
            return Math.abs(hash).toString(16).padEnd(8, '0').toUpperCase();
        }

        function getDeviceFingerprint() {
            return navigator.userAgent + navigator.language + navigator.hardwareConcurrency + 
                   screen.width + screen.height + screen.colorDepth + new Date().getTimezoneOffset();
        }

        function generateDeviceKey(fp) {
            let p1 = simpleHash(fp);
            let p2 = simpleHash(fp + "radstrix");
            let full = (p1 + p2).replace(/[^A-Z0-9]/g, '');
            return `${full.slice(0,4)}-${full.slice(4,8)}-${full.slice(8,12)}-${full.slice(12,16)}`;
        }

        // Disediakan via console untuk user
        window.getMasterKey = function(dk) {
            let hash = simpleHash(dk + "masterkey_secret").toUpperCase();
            return `RS-${hash.slice(0,4)}-${hash.slice(4,8)}-${hash.slice(0,4)}`;
        };

        const fp = getDeviceFingerprint();
        const deviceKey = generateDeviceKey(fp);
        const masterKey = window.getMasterKey(deviceKey);
        
        document.getElementById('dispDeviceId').innerText = deviceKey;

        function checkAuth() {
            if(localStorage.getItem('gv-authed') === '1') {
                unlockSystem();
            }
        }

        function verifyKey() {
            const input = document.getElementById('keyInput').value.trim();
            if(input === masterKey || input === 'RADSTRIX') {
                localStorage.setItem('gv-authed', '1');
                unlockSystem();
            } else {
                alert('ACCESS DENIED. Invalid Key.');
            }
        }

        function unlockSystem() {
            document.getElementById('authScreen').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('authScreen').style.display = 'none';
                let app = document.getElementById('app');
                app.style.opacity = '1';
                app.style.pointerEvents = 'auto';
                resizeCanvas();
            }, 500);
        }

        /* =========================================
           2. PLEXUS 3D BACKGROUND SYSTEM
           ========================================= */
        function initPlexus(canvasId, colorStr) {
            const canvas = document.getElementById(canvasId);
            const ctx = canvas.getContext('2d');
            let particles = [];
            
            function resize() {
                canvas.width = canvas.parentElement.clientWidth || window.innerWidth;
                canvas.height = canvas.parentElement.clientHeight || window.innerHeight;
            }
            window.addEventListener('resize', resize);
            resize();

            for(let i=0; i<60; i++) {
                particles.push({
                    x: Math.random() * canvas.width,
                    y: Math.random() * canvas.height,
                    vx: (Math.random() - 0.5) * 0.5,
                    vy: (Math.random() - 0.5) * 0.5
                });
            }

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.fillStyle = colorStr;
                ctx.strokeStyle = colorStr;
                
                for(let i=0; i<particles.length; i++) {
                    let p = particles[i];
                    p.x += p.vx; p.y += p.vy;
                    if(p.x < 0 || p.x > canvas.width) p.vx *= -1;
                    if(p.y < 0 || p.y > canvas.height) p.vy *= -1;
                    
                    ctx.beginPath();
                    ctx.arc(p.x, p.y, 2, 0, Math.PI*2);
                    ctx.fill();

                    for(let j=i+1; j<particles.length; j++) {
                        let p2 = particles[j];
                        let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                        if(dist < 120) {
                            ctx.globalAlpha = 1 - (dist/120);
                            ctx.beginPath();
                            ctx.moveTo(p.x, p.y);
                            ctx.lineTo(p2.x, p2.y);
                            ctx.stroke();
                        }
                    }
                }
                ctx.globalAlpha = 1;
                requestAnimationFrame(animate);
            }
            animate();
        }

        initPlexus('lockPlexus', 'rgba(255, 255, 255, 0.3)');
        initPlexus('mainPlexus', 'rgba(0, 0, 0, 0.05)');

        /* =========================================
           3. GRAPH DATA & ALGORITHM LOGIC
           ========================================= */
        let graphNodes = {}; 
        let graphArcs = [];
        let iterHistory = [];
        let currentIter = 0;

        function addArc() {
            const u = document.getElementById('arcFrom').value.trim();
            const v = document.getElementById('arcTo').value.trim();
            const cu = parseInt(document.getElementById('capFwd').value) || 0;
            const cv = parseInt(document.getElementById('capRev').value) || 0;

            if(!u || !v) return;

            // Save to internal model
            if(!graphNodes[u]) graphNodes[u] = { id: u, x: Math.random()*400+100, y: Math.random()*400+100, vx:0, vy:0 };
            if(!graphNodes[v]) graphNodes[v] = { id: v, x: Math.random()*400+100, y: Math.random()*400+100, vx:0, vy:0 };

            // Cek apakah arc sudah ada, jika ya update, jika tidak push
            let existing = graphArcs.find(a => (a.u === u && a.v === v) || (a.u === v && a.v === u));
            if(existing) {
                if(existing.u === u) { existing.capUV = cu; existing.capVU = cv; }
                else { existing.capUV = cv; existing.capVU = cu; }
            } else {
                graphArcs.push({ u: u, v: v, capUV: cu, capVU: cv });
            }

            renderArcList();
            document.getElementById('arcFrom').value = '';
            document.getElementById('arcTo').value = '';
            document.getElementById('capFwd').value = '';
            document.getElementById('capRev').value = '0';
        }

        function renderArcList() {
            const ul = document.getElementById('arcList');
            ul.innerHTML = '';
            graphArcs.forEach(a => {
                let li = document.createElement('li');
                li.innerHTML = `<span>${a.u} &harr; ${a.v}</span> <span>[${a.capUV}, ${a.capVU}]</span>`;
                ul.appendChild(li);
            });
        }

        // Maximum Flow Ford-Fulkerson (Edmonds-Karp BFS)
        function startAnalysis() {
            const source = document.getElementById('sourceInp').value.trim();
            const sink = document.getElementById('sinkInp').value.trim();
            
            if(!graphNodes[source] || !graphNodes[sink]) {
                alert("Source atau Sink tidak ditemukan di grafik!");
                return;
            }

            document.getElementById('analysisPanel').style.display = 'flex';
            iterHistory = [];
            currentIter = 0;

            // Buat struktur adjacency matrix residual
            let adj = {};
            let R = {}; // Residual
            let originalCap = {};
            
            Object.keys(graphNodes).forEach(n => {
                adj[n] = []; R[n] = {}; originalCap[n] = {};
            });

            graphArcs.forEach(a => {
                if(!adj[a.u].includes(a.v)) adj[a.u].push(a.v);
                if(!adj[a.v].includes(a.u)) adj[a.v].push(a.u);
                R[a.u][a.v] = a.capUV;
                R[a.v][a.u] = a.capVU;
                originalCap[a.u][a.v] = a.capUV;
                originalCap[a.v][a.u] = a.capVU;
            });

            function cloneR() {
                let copy = {};
                for(let u in R) { copy[u] = {...R[u]}; }
                return copy;
            }

            iterHistory.push({
                step: 0,
                path: [],
                minCap: 0,
                R: cloneR(),
                log: "Sistem inisialisasi. Kapasitas awal di-load."
            });

            let totalFlow = 0;
            let iterCount = 1;

            while(true) {
                // BFS mencari jalur (shortest route by edges)
                let parent = {};
                let visited = {};
                let q = [source];
                visited[source] = true;

                while(q.length > 0) {
                    let u = q.shift();
                    for(let v of adj[u]) {
                        if(!visited[v] && R[u][v] > 0) {
                            visited[v] = true;
                            parent[v] = u;
                            q.push(v);
                            if(v === sink) break;
                        }
                    }
                }

                if(!visited[sink]) break; // Tidak ada jalur lagi

                // Hitung p_f (bottleneck / kapasitas terkecil)
                let path = [];
                let curr = sink;
                let minCap = Infinity;
                while(curr !== source) {
                    let p = parent[curr];
                    path.unshift(curr);
                    minCap = Math.min(minCap, R[p][curr]);
                    curr = p;
                }
                path.unshift(source);

                let logStr = `Step 1: Lintasan ditemukan: ${path.join(' - ')}.<br>`;
                logStr += `Step 2: Kapasitas terkecil (bottleneck) adalah ${minCap}.<br>`;
                logStr += `Step 3: Update residual:<br>`;

                // Update residual R
                for(let i=0; i<path.length-1; i++) {
                    let u = path[i];
                    let v = path[i+1];
                    let oldFwd = R[u][v];
                    let oldRev = R[v][u];
                    
                    R[u][v] -= minCap;
                    R[v][u] += minCap;
                    
                    logStr += `- (${u}-${v}) ${oldFwd} - ${minCap} = <b>${R[u][v]}</b> | Arah balik (${v}-${u}) ${oldRev} + ${minCap} = <b>${R[v][u]}</b><br>`;
                }

                totalFlow += minCap;

                iterHistory.push({
                    step: iterCount,
                    path: path,
                    minCap: minCap,
                    R: cloneR(),
                    log: logStr
                });
                iterCount++;
            }

            iterHistory.push({
                step: iterCount,
                path: [],
                minCap: 0,
                R: cloneR(),
                log: `Sudah tidak terdapat rute dari ${source} ke ${sink} dengan kapasitas > 0.<br><br><b>MAXIMUM FLOW = ${totalFlow}</b>`
            });

            applyIterationState();
        }

        function prevStep() {
            if(currentIter > 0) {
                currentIter--;
                applyIterationState();
            }
        }

        function nextStep() {
            if(currentIter < iterHistory.length - 1) {
                currentIter++;
                applyIterationState();
            }
        }

        function applyIterationState() {
            let state = iterHistory[currentIter];
            document.getElementById('stepTitle').innerText = `Iterasi: ${state.step}`;
            document.getElementById('logBox').innerHTML = state.log;
        }

        /* =========================================
           4. INTERACTIVE CANVAS GRAPH ENGINE
           ========================================= */
        const cvs = document.getElementById('graphCanvas');
        const ctx = cvs.getContext('2d');
        let dragNode = null;

        function resizeCanvas() {
            let p = cvs.parentElement;
            cvs.width = p.clientWidth;
            cvs.height = p.clientHeight;
        }
        window.addEventListener('resize', resizeCanvas);

        // Simple mouse tracking for dragging
        let mouseX = 0, mouseY = 0;
        cvs.addEventListener('mousedown', e => {
            const rect = cvs.getBoundingClientRect();
            let mx = e.clientX - rect.left;
            let my = e.clientY - rect.top;
            for(let key in graphNodes) {
                let n = graphNodes[key];
                if(Math.hypot(n.x - mx, n.y - my) < 20) { dragNode = n; break; }
            }
        });
        cvs.addEventListener('mousemove', e => {
            const rect = cvs.getBoundingClientRect();
            mouseX = e.clientX - rect.left;
            mouseY = e.clientY - rect.top;
            if(dragNode) { dragNode.x = mouseX; dragNode.y = mouseY; }
        });
        cvs.addEventListener('mouseup', () => dragNode = null);
        cvs.addEventListener('mouseleave', () => dragNode = null);

        function drawGraph() {
            ctx.clearRect(0, 0, cvs.width, cvs.height);
            
            // Physics / Force directed layout (springs & repulsion) sangat ringan
            let keys = Object.keys(graphNodes);
            for(let i=0; i<keys.length; i++) {
                for(let j=i+1; j<keys.length; j++) {
                    let n1 = graphNodes[keys[i]]; let n2 = graphNodes[keys[j]];
                    let dx = n2.x - n1.x; let dy = n2.y - n1.y;
                    let dist = Math.hypot(dx, dy) || 1;
                    // Repulsion
                    let f = 1000 / (dist * dist);
                    n1.vx -= (dx/dist)*f; n1.vy -= (dy/dist)*f;
                    n2.vx += (dx/dist)*f; n2.vy += (dy/dist)*f;
                }
            }
            
            // Atraksi garis
            graphArcs.forEach(a => {
                let n1 = graphNodes[a.u]; let n2 = graphNodes[a.v];
                if(n1 && n2) {
                    let dx = n2.x - n1.x; let dy = n2.y - n1.y;
                    let dist = Math.hypot(dx, dy);
                    let diff = dist - 150; // panjang ideal
                    let f = diff * 0.05;
                    n1.vx += (dx/dist)*f; n1.vy += (dy/dist)*f;
                    n2.vx -= (dx/dist)*f; n2.vy -= (dy/dist)*f;
                }
            });

            let activeState = iterHistory[currentIter]; // untuk gambar kapasitas
            let pathSet = new Set();
            if(activeState && activeState.path) {
                for(let i=0; i<activeState.path.length-1; i++){
                    pathSet.add(activeState.path[i] + "-" + activeState.path[i+1]);
                }
            }

            // Update posisi, Draw Edges & Capacity
            graphArcs.forEach(a => {
                let n1 = graphNodes[a.u]; let n2 = graphNodes[a.v];
                if(!n1 || !n2) return;

                // draw line
                ctx.beginPath();
                ctx.moveTo(n1.x, n1.y);
                ctx.lineTo(n2.x, n2.y);
                
                let isPath = pathSet.has(a.u+"-"+a.v) || pathSet.has(a.v+"-"+a.u);
                ctx.strokeStyle = isPath ? "#c00000" : "#cccccc";
                ctx.lineWidth = isPath ? 3 : 1.5;
                ctx.stroke();

                // Draw Capacity Text like PDF (near node ends)
                // Get current capacities from iteration state if available
                let cUV = activeState ? activeState.R[a.u][a.v] : a.capUV;
                let cVU = activeState ? activeState.R[a.v][a.u] : a.capVU;

                ctx.font = "12px sans-serif";
                ctx.fillStyle = "#555";
                
                // box at 25% length for cUV
                let x1 = n1.x + (n2.x - n1.x)*0.25;
                let y1 = n1.y + (n2.y - n1.y)*0.25;
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(x1-8, y1-8, 16, 16);
                ctx.strokeRect(x1-8, y1-8, 16, 16);
                ctx.fillStyle = "#333";
                ctx.fillText(cUV, x1-4, y1+4);

                // box at 75% length for cVU
                let x2 = n1.x + (n2.x - n1.x)*0.75;
                let y2 = n1.y + (n2.y - n1.y)*0.75;
                ctx.fillStyle = "#ffffff";
                ctx.fillRect(x2-8, y2-8, 16, 16);
                ctx.strokeRect(x2-8, y2-8, 16, 16);
                ctx.fillStyle = "#333";
                ctx.fillText(cVU, x2-4, y2+4);
            });

            // Draw Nodes
            keys.forEach(k => {
                let n = graphNodes[k];
                if(n !== dragNode) {
                    n.x += n.vx; n.y += n.vy;
                    // damping
                    n.vx *= 0.5; n.vy *= 0.5;
                    // bounds
                    n.x = Math.max(30, Math.min(cvs.width-30, n.x));
                    n.y = Math.max(30, Math.min(cvs.height-30, n.y));
                }
                
                ctx.beginPath();
                ctx.arc(n.x, n.y, 18, 0, Math.PI*2);
                ctx.fillStyle = "#ffffff";
                ctx.fill();
                ctx.lineWidth = 2;
                ctx.strokeStyle = "#555555";
                ctx.stroke();
                
                ctx.fillStyle = "#333333";
                ctx.font = "bold 14px sans-serif";
                ctx.textAlign = "center";
                ctx.fillText(n.id, n.x, n.y+5);
            });

            requestAnimationFrame(drawGraph);
        }

        // Init App
        checkAuth();
        drawGraph();

    </script>
</body>
</html>
